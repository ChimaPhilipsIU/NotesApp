<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>New Reminder</title>
    <link href="https://fonts.googleapis.com/css2?family=EB+Garamond:ital,wght@0,400;0,500;0,600;0,700;1,400;1,500&family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&display=swap" rel="stylesheet"/>
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        :root {
            --bg: #080808;
            --surface: #0e0e0e;
            --surface2: #141414;
            --ink: #f0ece4;
            --ink-muted: #6b6357;
            --accent: #c82a2a;
            --accent-soft: rgba(200,42,42,0.07);
            --accent-glow: rgba(200,42,42,0.18);
            --border: #222;
            --border-bright: #333;
            --shadow: 0 4px 24px rgba(0,0,0,0.5);
            --reminder: #3a7bd5;
            --reminder-soft: rgba(58,123,213,0.07);
            --reminder-glow: rgba(58,123,213,0.22);
            --grain: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
        }

        body {
            background: var(--bg);
            background-image: var(--grain);
            font-family: 'EB Garamond', Georgia, serif;
            color: var(--ink);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* ── HEADER ── */
        header {
            display: flex;
            align-items: center;
            padding: 1.75rem 2.5rem;
            gap: 1.25rem;
            border-bottom: 1px solid var(--border);
            background: var(--surface);
            position: relative;
        }

        header::after {
            content: '';
            position: absolute;
            bottom: -1px;
            left: 2.5rem;
            width: 60px;
            height: 2px;
            background: var(--reminder);
        }

        .back-btn {
            text-decoration: none;
            color: var(--ink-muted);
            font-size: 0.78rem;
            letter-spacing: 0.12em;
            text-transform: uppercase;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            transition: color 0.15s;
            font-weight: 500;
        }

        .back-btn:hover { color: var(--ink); }
        .back-btn::before { content: '←'; font-size: 1rem; }

        header h1 {
            font-family: 'Cormorant Garamond', Georgia, serif;
            font-size: 1.6rem;
            font-weight: 300;
            letter-spacing: 0.12em;
            text-transform: uppercase;
            color: var(--ink);
        }

        /* ── EDITOR ── */
        .editor {
            flex: 1;
            display: flex;
            flex-direction: column;
            max-width: 860px;
            width: 100%;
            margin: 0 auto;
            padding: 3rem 2.5rem;
            gap: 0;
        }

        /* Title */
        .title-input {
            font-family: 'Cormorant Garamond', Georgia, serif;
            font-size: 2.4rem;
            font-weight: 300;
            letter-spacing: 0.02em;
            border: none;
            background: transparent;
            outline: none;
            color: var(--ink);
            width: 100%;
            border-bottom: 1px solid var(--border);
            padding-bottom: 1rem;
            margin-bottom: 2.5rem;
            transition: border-color 0.2s;
        }

        .title-input:focus { border-bottom-color: var(--reminder); }
        .title-input::placeholder { color: var(--ink-muted); font-style: italic; }

        /* Field groups */
        .field {
            display: flex;
            flex-direction: column;
            gap: 0.6rem;
            margin-bottom: 2rem;
        }

        .field label {
            font-size: 0.68rem;
            font-weight: 500;
            color: var(--ink-muted);
            letter-spacing: 0.15em;
            text-transform: uppercase;
        }

        /* Content textarea */
        .text-input {
            font-family: 'EB Garamond', Georgia, serif;
            font-size: 1.05rem;
            line-height: 1.9;
            border: 1px solid var(--border);
            background: var(--surface2);
            outline: none;
            color: var(--ink);
            width: 100%;
            resize: none;
            border-radius: 2px;
            padding: 1rem 1.25rem;
            transition: border-color 0.2s, box-shadow 0.2s;
        }

        .text-input:focus {
            border-color: var(--reminder);
            box-shadow: 0 0 0 3px var(--reminder-soft);
        }

        .text-input::placeholder { color: var(--ink-muted); font-style: italic; }

        /* Date input */
        .date-input {
            font-family: 'EB Garamond', Georgia, serif;
            font-size: 0.95rem;
            border: 1px solid var(--border);
            background: var(--surface2);
            outline: none;
            color: var(--ink);
            padding: 0.65rem 1rem;
            border-radius: 2px;
            width: fit-content;
            transition: border-color 0.2s, box-shadow 0.2s;
            color-scheme: dark;
        }

        .date-input:focus {
            border-color: var(--reminder);
            box-shadow: 0 0 0 3px var(--reminder-soft);
        }

        /* Folder row */
        .folder-row {
            display: flex;
            align-items: center;
            gap: 0.6rem;
            border-top: 1px solid var(--border);
            padding-top: 1.25rem;
            margin-bottom: 2rem;
        }

        .folder-icon { font-size: 0.85rem; color: var(--ink-muted); }

        .folder-input {
            font-family: 'EB Garamond', Georgia, serif;
            font-size: 0.88rem;
            letter-spacing: 0.04em;
            border: none;
            background: transparent;
            outline: none;
            color: var(--ink-muted);
            flex: 1;
            transition: color 0.15s;
        }

        .folder-input:focus { color: var(--ink); }
        .folder-input::placeholder { color: var(--ink-muted); font-style: italic; }

        /* Save button */
        .save-btn {
            align-self: flex-end;
            background: var(--reminder);
            color: var(--ink);
            border: none;
            padding: 0.65rem 2rem;
            border-radius: 2px;
            font-family: 'EB Garamond', Georgia, serif;
            font-size: 0.82rem;
            font-weight: 500;
            letter-spacing: 0.14em;
            text-transform: uppercase;
            cursor: pointer;
            box-shadow: 0 0 20px var(--reminder-glow);
            transition: transform 0.15s, box-shadow 0.15s, opacity 0.15s;
        }

        .save-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 0 32px var(--reminder-glow);
            opacity: 0.9;
        }
    </style>
</head>
<body>

<header>
    <a th:href="@{/notes}" class="back-btn">Back</a>
    <h1>New Reminder</h1>
</header>

<form th:action="@{/reminders/create}" th:object="${reminder}" method="post" class="editor">

    <input
        class="title-input"
        type="text"
        th:field="*{title}"
        placeholder="Reminder title..."
        autocomplete="off"
    />

    <div class="field">
        <label>Content</label>
        <textarea
            class="text-input"
            th:field="*{content}"
            placeholder="What do you need to remember?"
            rows="5"
        ></textarea>
    </div>

    <div class="field">
        <label>Due Date</label>
        <input
            class="date-input"
            type="datetime-local"
            th:field="*{dueDate}"
        />
    </div>

    <div class="folder-row">
        <span class="folder-icon">📁</span>
        <input
            class="folder-input"
            type="text"
            th:field="*{folder}"
            placeholder="Folder (optional)..."
            autocomplete="off"
        />
    </div>

    <button type="submit" class="save-btn">Save Reminder</button>

</form>

</body>
</html>
