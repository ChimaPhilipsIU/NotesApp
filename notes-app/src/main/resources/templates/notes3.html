<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Notes</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        :root {
            --bg: #f5f0e8;
            --surface: #fffdf7;
            --ink: #1a1814;
            --ink-muted: #6b6560;
            --accent: #c8502a;
            --accent-soft: rgba(200,80,42,0.08);
            --border: #e0d9ce;
            --shadow: 0 2px 12px rgba(0,0,0,0.08);
            --reminder: #2a6bc8;
            --reminder-soft: rgba(42,107,200,0.08);
        }

        body {
            background: var(--bg);
            font-family: 'DM Sans', sans-serif;
            color: var(--ink);
            min-height: 100vh;
        }

        /* ── HEADER ── */
        header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 1.5rem 2rem;
            border-bottom: 1px solid var(--border);
        }

        header h1 {
            font-family: 'Playfair Display', serif;
            font-size: 1.8rem;
            font-weight: 600;
            letter-spacing: -0.02em;
        }

        .add-btn {
            width: 44px;
            height: 44px;
            border-radius: 50%;
            background: var(--accent);
            color: white;
            border: none;
            font-size: 1.6rem;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 4px 14px rgba(200,80,42,0.35);
            transition: transform 0.15s ease, box-shadow 0.15s ease;
        }

        .add-btn:hover {
            transform: scale(1.08);
            box-shadow: 0 6px 20px rgba(200,80,42,0.45);
        }

        /* ── TABS ── */
        .tabs {
            display: flex;
            padding: 0 2rem;
            border-bottom: 1px solid var(--border);
            background: var(--surface);
        }

        .tab-btn {
            background: none;
            border: none;
            padding: 1rem 1.5rem;
            font-family: 'DM Sans', sans-serif;
            font-size: 0.88rem;
            font-weight: 500;
            color: var(--ink-muted);
            cursor: pointer;
            border-bottom: 2px solid transparent;
            margin-bottom: -1px;
            transition: color 0.15s, border-color 0.15s;
        }

        .tab-btn.active { color: var(--accent); border-bottom-color: var(--accent); }
        .tab-btn.reminders-tab.active { color: var(--reminder); border-bottom-color: var(--reminder); }

        /* ── TAB PANELS ── */
        .tab-panel { display: none; }
        .tab-panel.active { display: block; }

        /* ── NOTES GRID ── */
        .notes-grid {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 1.25rem;
            padding: 2rem;
            max-width: 1400px;
            margin: 0 auto;
        }

        @media (max-width: 1100px) { .notes-grid { grid-template-columns: repeat(3, 1fr); } }
        @media (max-width: 700px)  { .notes-grid { grid-template-columns: repeat(2, 1fr); } }
        @media (max-width: 480px)  { .notes-grid { grid-template-columns: 1fr; } }

        .note-card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 10px;
            padding: 1.25rem;
            min-height: 160px;
            cursor: pointer;
            text-decoration: none;
            color: inherit;
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
            box-shadow: var(--shadow);
            transition: transform 0.15s ease, box-shadow 0.15s ease;
        }

        .note-card:hover { transform: translateY(-3px); box-shadow: 0 8px 24px rgba(0,0,0,0.12); }

        .note-card h2 {
            font-family: 'Playfair Display', serif;
            font-size: 1rem;
            font-weight: 600;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .note-card p {
            font-size: 0.82rem;
            color: var(--ink-muted);
            line-height: 1.5;
            overflow: hidden;
            display: -webkit-box;
            -webkit-line-clamp: 4;
            -webkit-box-orient: vertical;
            flex: 1;
        }

        /* ── REMINDERS LIST ── */
        .reminders-list {
            display: flex;
            flex-direction: column;
            gap: 1rem;
            padding: 2rem;
            max-width: 860px;
            margin: 0 auto;
        }

        .reminder-card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-left: 4px solid var(--reminder);
            border-radius: 10px;
            padding: 1.25rem 1.5rem;
            box-shadow: var(--shadow);
        }

        .reminder-card h3 {
            font-family: 'Playfair Display', serif;
            font-size: 1rem;
            margin-bottom: 0.3rem;
        }

        .reminder-card p { font-size: 0.83rem; color: var(--ink-muted); line-height: 1.5; }
        .reminder-due { font-size: 0.75rem; color: var(--reminder); font-weight: 500; margin-top: 0.4rem; }

        /* ── EMPTY STATE ── */
        .empty-state {
            text-align: center;
            padding: 5rem 2rem;
            color: var(--ink-muted);
            grid-column: 1 / -1;
        }

        .empty-state p { font-family: 'Playfair Display', serif; font-size: 1.2rem; margin-bottom: 0.5rem; }
        .empty-state span { font-size: 0.85rem; }

        /* ── OVERLAYS ── */
        .overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.45);
            backdrop-filter: blur(3px);
            z-index: 100;
            align-items: center;
            justify-content: center;
        }

        .overlay.visible { display: flex; animation: fadeIn 0.2s ease; }

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        @keyframes slideUp { from { opacity: 0; transform: translateY(24px); } to { opacity: 1; transform: translateY(0); } }

        /* ── CHOOSER POPUP ── */
        .chooser {
            background: var(--surface);
            border-radius: 16px;
            padding: 2rem;
            width: 360px;
            box-shadow: 0 24px 60px rgba(0,0,0,0.2);
            animation: slideUp 0.25s ease;
        }

        .chooser h2 {
            font-family: 'Playfair Display', serif;
            font-size: 1.3rem;
            margin-bottom: 1.25rem;
            text-align: center;
        }

        .chooser-options { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; }

        .chooser-option {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 0.6rem;
            padding: 1.5rem 1rem;
            border-radius: 12px;
            border: 2px solid var(--border);
            text-decoration: none;
            color: var(--ink);
            transition: border-color 0.15s, background 0.15s, transform 0.15s;
        }

        .chooser-option:hover { transform: translateY(-2px); }
        .chooser-option.note:hover { border-color: var(--accent); background: var(--accent-soft); }
        .chooser-option.reminder:hover { border-color: var(--reminder); background: var(--reminder-soft); }
        .chooser-option .icon { font-size: 2rem; line-height: 1; }
        .chooser-option span { font-size: 0.85rem; font-weight: 500; }

        .chooser-close {
            display: block;
            width: 100%;
            margin-top: 1rem;
            padding: 0.6rem;
            background: none;
            border: 1px solid var(--border);
            border-radius: 8px;
            font-family: 'DM Sans', sans-serif;
            font-size: 0.85rem;
            color: var(--ink-muted);
            cursor: pointer;
        }

        .chooser-close:hover { background: var(--bg); }

        /* ── REMINDER MODAL ── */
        .reminder-modal {
            background: var(--surface);
            border-radius: 16px;
            padding: 2rem;
            width: 480px;
            max-width: 95vw;
            max-height: 80vh;
            overflow-y: auto;
            box-shadow: 0 24px 60px rgba(0,0,0,0.2);
            animation: slideUp 0.25s ease;
        }

        .reminder-modal-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 1.25rem;
        }

        .reminder-modal-header h2 { font-family: 'Playfair Display', serif; font-size: 1.3rem; }

        .modal-close {
            background: none;
            border: none;
            font-size: 1.4rem;
            color: var(--ink-muted);
            cursor: pointer;
            transition: color 0.15s;
        }

        .modal-close:hover { color: var(--ink); }

        .modal-reminder-item {
            padding: 1rem;
            border-left: 3px solid var(--reminder);
            background: var(--reminder-soft);
            border-radius: 0 8px 8px 0;
            margin-bottom: 0.75rem;
        }

        .modal-reminder-item h3 { font-size: 0.95rem; font-weight: 500; margin-bottom: 0.25rem; }
        .modal-reminder-item p { font-size: 0.82rem; color: var(--ink-muted); }
        .modal-reminder-item .due { font-size: 0.75rem; color: var(--reminder); font-weight: 500; margin-top: 0.3rem; }

        .modal-dismiss {
            display: block;
            width: 100%;
            margin-top: 1.25rem;
            padding: 0.7rem;
            background: var(--reminder);
            color: white;
            border: none;
            border-radius: 8px;
            font-family: 'DM Sans', sans-serif;
            font-size: 0.9rem;
            font-weight: 500;
            cursor: pointer;
        }

        .modal-dismiss:hover { opacity: 0.9; }
    </style>
</head>
<body>

<!-- ── REMINDER POPUP (auto-shows on login if reminders exist) ── -->
<div class="overlay" id="reminderOverlay">
    <div class="reminder-modal">
        <div class="reminder-modal-header">
            <h2>You have reminders</h2>
            <button class="modal-close" onclick="closeReminderModal()">×</button>
        </div>
        <div th:each="reminder : ${reminders}">
            <div class="modal-reminder-item">
                <h3 th:text="${reminder.title}">Reminder title</h3>
                <p th:text="${reminder.content}">Content</p>
                <div class="due" th:text="${reminder.dueDate}">Due date</div>
            </div>
        </div>
        <button class="modal-dismiss" onclick="closeReminderModal()">Got it</button>
    </div>
</div>

<!-- ── CREATE CHOOSER POPUP ── -->
<div class="overlay" id="chooserOverlay">
    <div class="chooser">
        <h2>What would you like to create?</h2>
        <div class="chooser-options">
            <a th:href="@{/notes/create}" class="chooser-option note">
                <span class="icon">📝</span>
                <span>Note</span>
            </a>
            <a th:href="@{/reminders/create}" class="chooser-option reminder">
                <span class="icon">🔔</span>
                <span>Reminder</span>
            </a>
        </div>
        <button class="chooser-close" onclick="closeChooser()">Cancel</button>
    </div>
</div>

<!-- ── HEADER ── -->
<header>
    <h1>My Workspace</h1>
    <button class="add-btn" onclick="openChooser()" title="Create new">+</button>
</header>

<!-- ── TABS ── -->
<div class="tabs">
    <button class="tab-btn active" onclick="switchTab('notes', this)">Notes</button>
    <button class="tab-btn reminders-tab" onclick="switchTab('reminders', this)">Reminders</button>
</div>

<!-- ── NOTES TAB ── -->
<div class="tab-panel active" id="tab-notes">
    <div class="notes-grid">
        <a th:each="note : ${notes}" th:href="@{/notes/{id}/edit(id=${note.id})}" class="note-card">
            <h2 th:text="${note.title}">Note Title</h2>
            <p th:text="${note.content}">Note preview...</p>
        </a>
        <div class="empty-state" th:if="${#lists.isEmpty(notes)}">
            <p>No notes yet.</p>
            <span>Click + to create your first one.</span>
        </div>
    </div>
</div>

<!-- ── REMINDERS TAB ── -->
<div class="tab-panel" id="tab-reminders">
    <div class="reminders-list">
        <div th:each="reminder : ${reminders}" class="reminder-card">
            <h3 th:text="${reminder.title}">Reminder title</h3>
            <p th:text="${reminder.content}">Content</p>
            <div class="reminder-due" th:text="${reminder.dueDate}">Due date</div>
        </div>
        <div class="empty-state" th:if="${#lists.isEmpty(reminders)}">
            <p>No reminders yet.</p>
            <span>Click + to add one.</span>
        </div>
    </div>
</div>

<script th:inline="javascript">
    function switchTab(name, btn) {
        document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        document.getElementById('tab-' + name).classList.add('active');
        btn.classList.add('active');
    }

    function openChooser() {
        document.getElementById('chooserOverlay').classList.add('visible');
    }

    function closeChooser() {
        document.getElementById('chooserOverlay').classList.remove('visible');
    }

    function closeReminderModal() {
        document.getElementById('reminderOverlay').classList.remove('visible');
    }

    // Auto-show reminder modal on page load if reminders exist
    window.addEventListener('DOMContentLoaded', () => {
        const hasReminders = /*[[${!#lists.isEmpty(reminders)}]]*/ false;
        if (hasReminders) {
            document.getElementById('reminderOverlay').classList.add('visible');
        }
    });

    // Close overlays by clicking the backdrop
    document.querySelectorAll('.overlay').forEach(overlay => {
        overlay.addEventListener('click', (e) => {
            if (e.target === overlay) overlay.classList.remove('visible');
        });
    });
</script>

</body>
</html>
