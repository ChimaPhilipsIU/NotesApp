<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Home</title>
    <link href="https://fonts.googleapis.com/css2?family=EB+Garamond:ital,wght@0,400;0,500;0,600;0,700;1,400;1,500&family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&display=swap" rel="stylesheet"/>
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        :root {
            --bg: #080808;
            --surface: #0e0e0e;
            --surface2: #141414;
            --ink: #f0ece4;
            --ink-muted: #6b6357;
            --accent: #c82a2a;
            --accent-soft: rgba(200,42,42,0.07);
            --accent-glow: rgba(200,42,42,0.18);
            --border: #222;
            --border-bright: #333;
            --grain: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
        }

        body {
            background: var(--bg);
            background-image: var(--grain);
            font-family: 'EB Garamond', Georgia, serif;
            color: var(--ink);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        /* Subtle ruled-line texture */
        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background-image: repeating-linear-gradient(
                transparent,
                transparent 31px,
                rgba(240,236,228,0.025) 31px,
                rgba(240,236,228,0.025) 32px
            );
            pointer-events: none;
            z-index: 0;
        }

        /* Radial accent glow behind the card */
        body::after {
            content: '';
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 600px;
            height: 600px;
            background: radial-gradient(ellipse at center, rgba(200,42,42,0.06) 0%, transparent 70%);
            pointer-events: none;
            z-index: 0;
        }

        .card {
            position: relative;
            z-index: 1;
            background: var(--surface);
            border: 1px solid var(--border);
            padding: 4.5rem 5rem;
            max-width: 560px;
            width: 90%;
            text-align: center;
            box-shadow: 0 40px 80px rgba(0,0,0,0.7), 0 0 60px rgba(200,42,42,0.05);
            animation: rise 0.7s cubic-bezier(0.16, 1, 0.3, 1) both;
        }

        /* Left accent rule */
        .card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 2px;
            height: 60px;
            background: var(--accent);
        }

        /* Bottom-right corner mark */
        .card::after {
            content: '';
            position: absolute;
            bottom: 0;
            right: 0;
            width: 2px;
            height: 60px;
            background: var(--border-bright);
        }

        @keyframes rise {
            from { opacity: 0; transform: translateY(28px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        .ornament {
            display: block;
            font-size: 0.75rem;
            color: var(--accent);
            letter-spacing: 0.4em;
            margin-bottom: 1.75rem;
            opacity: 0.8;
            animation: rise 0.6s 0.1s cubic-bezier(0.16, 1, 0.3, 1) both;
        }

        h1 {
            font-family: 'Cormorant Garamond', Georgia, serif;
            font-size: clamp(1.9rem, 5vw, 2.8rem);
            font-weight: 300;
            color: var(--ink);
            line-height: 1.25;
            letter-spacing: 0.04em;
            margin-bottom: 1.25rem;
            animation: rise 0.6s 0.15s cubic-bezier(0.16, 1, 0.3, 1) both;
        }

        .divider {
            width: 48px;
            height: 1px;
            background: var(--accent);
            margin: 0 auto 1.5rem;
            animation: rise 0.6s 0.2s cubic-bezier(0.16, 1, 0.3, 1) both;
        }

        p {
            font-family: 'EB Garamond', Georgia, serif;
            font-size: 1rem;
            font-style: italic;
            color: var(--ink-muted);
            letter-spacing: 0.03em;
            line-height: 1.7;
            margin-bottom: 3rem;
            animation: rise 0.6s 0.25s cubic-bezier(0.16, 1, 0.3, 1) both;
        }

        .btn {
            display: inline-block;
            background: var(--accent);
            color: var(--ink);
            font-family: 'EB Garamond', Georgia, serif;
            font-size: 0.82rem;
            font-weight: 500;
            letter-spacing: 0.16em;
            text-transform: uppercase;
            text-decoration: none;
            padding: 0.8rem 2.5rem;
            border: none;
            border-radius: 2px;
            cursor: pointer;
            box-shadow: 0 0 24px var(--accent-glow);
            transition: transform 0.15s ease, box-shadow 0.15s ease, opacity 0.15s;
            animation: rise 0.6s 0.32s cubic-bezier(0.16, 1, 0.3, 1) both;
        }

        .btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 0 40px var(--accent-glow);
        }

        .btn:active {
            transform: translateY(0);
            box-shadow: 0 0 12px var(--accent-glow);
        }
    </style>
</head>
<body>
    <div class="card">
        <span class="ornament">✦ &nbsp; ✦ &nbsp; ✦</span>
        <h1>Welcome to<br>The Note Taking App</h1>
        <div class="divider"></div>
        <p>Capture your thoughts, ideas,<br>and everything in between.</p>
        <a th:href="@{/notes}" href="/notes" class="btn">View Notes</a>
    </div>
</body>
</html>
